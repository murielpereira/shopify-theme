<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="text-xl font-bold tracking-tighter text-[#5a4742] dark:text-stone-100 uppercase">

</div>

<!-- Step Indicator -->
<div class="flex items-center justify-between mb-12">
<div class="flex flex-col items-center">

</div>

<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center text-sm font-medium mb-2">3</div>

</div>

<button class="text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined text-sm">add</span></button>

</div>
</div>
</div>

<span class="text-xs font-medium">1</span>
<button class="text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined text-sm">add</span></button>

</div>
</div>
</div>

<span>$165.00</span>
</div>
<div class="flex justify-between text-sm text-on-surface-variant">

<label class="absolute left-0 -top-4 text-xs text-on-surface-variant transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-2 peer-focus:-top-4 peer-focus:text-xs peer-focus:text-primary" for="email">Email Address</label>
</div>

<div class="flex items-center gap-3">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-background bg-transparent transition-all" id="newsletter" type="checkbox"/>
